<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: black;
        }
        .transform{
            display: flex;
            flex-direction: column;
            width: 600px;
            height: 200px;
        }
        .tt_transform{
            text-align: center;
            color:blueviolet;
            font-size: 18px;
            font-weight: 700;
        }
        .tt_transform::before{
            content: "\f219";
            font-family: "Font Awesome 6 Free"; 
            font-weight: 900; 
            display: inline-block; 
            margin-right: 10px;
        }
        .grid_trans{
            display: flex;
            flex-direction: row;
            justify-content: space-between;
        }
        .translate, .scale, .rotate, .combine{
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 120px;
            height: 120px;
            border-radius: 16px;
            background-color: blueviolet;
        }
        .translate:hover{
            transform: translateX(20px);
            transition: transform 0.5s;
        }
        .rotate:hover{
            transform: rotate(45deg);
            transition: transform 0.5s;
        }
        .scale:hover{
            transform: scale(1.3);
            transition: transform 0.5s;
        }
        .combine:hover{
            transform: translateY(2px) rotate(20deg) scale(1.1);
            transform-origin: 100% 100%;
            transition: transform 0.5s; 
        }
        .overlay{
            display: flex;
            flex-direction: column;
            width: 600px;
            height: 300px;
            gap: 25px;
        }
        .tt_overlay{
            text-align: center;
            color:blueviolet;
            font-size: 18px;
            font-weight: 700;
        }
        .tt_overlay::before{
            content: "\f1c5";
            font-family: "Font Awesome 6 Free"; 
            font-weight: 900; 
            display: inline-block; 
            margin-right: 10px;
        }
        .grid_overlay{
            display: flex;
            flex-direction: row;
            justify-content: space-between;
        }
        .card{
            position: relative;
            width: 180px;
            height: 200px;
            border-radius: 16px;
            overflow: hidden;
            z-index: 1;
        }
        img{
            position: absolute;
            top: 0;
            left: 0;
            object-fit: cover;
            width: 100%;
            height:100%;
        }
        .card::before{
            content: "";
            background: linear-gradient(to bottom,rgba(138, 43, 226, 0.1), rgba(138, 43, 226, 0.8));
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }
        .card:hover::before{
            opacity: 1;
            transition: opacity 0.5s;            
        }
        .animation{
            display: flex;
            flex-direction: column;
            width: 600px;
            height: 200px;
            gap: 25px;
        }
        .tt_ani{
            text-align: center;
            color:blueviolet;
            font-size: 18px;
            font-weight: 700;
        }
        .tt_ani::before{
            content: "\f144";
            font-family: "Font Awesome 6 Free"; 
            font-weight: 900; 
            display: inline-block; 
            margin-right: 10px;
        }
        .grid_ani{
            display: flex;
            flex-direction: row;
            justify-content: space-between;
        }
        .bounce, .spin, .pulse, .slideln{
            width: 100px;
            height: 100px;
            border-radius: 16px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .bounce {
            animation: bounce 0.6s infinite alternate ease-in-out;
            background-color: red;
        }
        .spin {
            animation: spin 2s infinite linear;
            background-color: darkorange;
        }
        .pulse {
            animation: pulse 1s infinite alternate ease-in-out;
            background-color: green;
        }
        .slideln{
            background-color: aqua;
        }
        
        @keyframes bounce {
            from {transform: translateY(0);}
            to {transform: translateY(10px);}
        }
        @keyframes spin {
            from {transform: rotate(0deg);}
            to {transform: rotate(360deg);}
            
        }
        @keyframes pulse{
            from {transform: scale(1); opacity: 0.6;}
            to {transform: scale(1.2); opacity: 1;}
        }
        .loader{
            display: flex;
            flex-direction: column;
            width: 600px;
            height: 200px;
            gap: 25px;
        }
        .tt_loader{
            text-align: center;
            color:blueviolet;
            font-size: 18px;
            font-weight: 700;
        }
        .tt_loader::before{
            content: "\f254";
            font-family: "Font Awesome 6 Free"; 
            font-weight: 900; 
            display: inline-block; 
            margin-right: 10px;
        }
        .grid_loader{
            display: flex;
            flex-direction: row;
            justify-content: space-between;
        }
        .xoayvong{
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: solid 5px grey;
            border-top: solid 5px blueviolet;
            animation: xoayvong 0.5s infinite linear;
        }
        @keyframes xoayvong {
            from {transform: rotate(0deg);}
            to {transform: rotate(360deg);}
        }
        .dot{
            display: flex;
            gap: 10px;
        }
        .dot span{
            width: 10px;
            height: 10px;
            background-color: blueviolet;
            border-radius: 50%;
            animation: dot 0.8s ease-in-out infinite;
        }
        @keyframes dot {
            0%, 100% {transform: translateY(0px);}
            50% {transform: translateY(30px);}
        }
        .dot span:nth-child(2) { animation-delay: 0.15s;
        }
        .dot span:nth-child(3) {
            animation-delay: 0.3s
        }
        .bar{
            display: flex;
            gap: 5px;
            height: 40px;
        }
        .bar span{
            width: 7px;
            height: 30px;
            animation: scalee 0.8s ease-in-out infinite;
            background-color: blueviolet;
            border-radius: 3px;
        }
        @keyframes scalee {
            0%, 100% {transform: scaleY(1)}
            50% {transform: scaleY(0.3)}
        }
        .bar span:nth-child(2){
            animation-delay: 0.1s;
        }
        .bar span:nth-child(3){
            animation-delay: 0.2s;
        }
        .bar span:nth-child(4){
            animation-delay: 0.3s;
        }
        .bar span:nth-child(5){
            animation-delay: 0.4s;
        }

    </style>
</head>
<body>
    <div class = "transform">
        <p class = "tt_transform">Transform - Hover vào từng ô</p>
        <div class = "grid_trans">
            <div class = "translate">translate</div>
            <div class = "rotate">rotate</div>
            <div class = "scale">scale</div>
            <div class = "combine">combine</div>
        </div>
    </div>
    <div class = "overlay">
        <div class = "tt_overlay">Overlay Effect - Hover vào card</div>
        <div class = "grid_overlay">
            <div class = "card">
                <img src="Soothing-nature-backgrounds-2.jpg" alt="">
            </div>
            <div class = "card">
                <img src="tải xuống copy.jpg" alt="">
            </div>
            <div class = "card">
                <img src="tải xuống.jpg" alt="">
            </div>
        </div>
    </div>
    <div class = "animation">
        <div class = "tt_ani">@keyframes Animation</div>
        <div class = "grid_ani">
            <div class = "bounce">bounce</div>
            <div class = "spin">spin</div>
            <div class = "pulse">pulse</div>
            <div class = "slideln">slideln</div>

        </div>
    </div>
    <div class = "loader">
        <div class = "tt_loader">CSS Loaders (pure CSS)</div>
        <div class = "grid_loader">
            <div class = "xoayvong"></div>
            <div class = "dot">
                <span></span><span></span><span></span>
            </div>
            <div class = "bar">
                <span></span><span></span><span></span><span></span><span></span>
            </div>
        </div>
    </div>
</body>
</html>
